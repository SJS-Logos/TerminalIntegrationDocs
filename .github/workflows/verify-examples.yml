name: Verify Compilable Examples

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/**'
      - '.github/workflows/verify-examples.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'examples/**'

jobs:
  verify-csharp:
    name: Verify C# Example
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: examples/csharp
      run: dotnet restore

    - name: Build solution
      working-directory: examples/csharp
      run: dotnet build --configuration Release --no-restore

    - name: Verify all projects built
      working-directory: examples/csharp
      run: |
        echo "? Checking build outputs..."

        # Check each project's output
        if [ ! -f "Logos.PaymentService.Domain/bin/Release/net8.0/Logos.PaymentService.Domain.dll" ]; then
          echo "? Domain project did not build"
          exit 1
        fi

        if [ ! -f "Logos.PaymentService.Application/bin/Release/net8.0/Logos.PaymentService.Application.dll" ]; then
          echo "? Application project did not build"
          exit 1
        fi

        if [ ! -f "Logos.PaymentService.Adapters/bin/Release/net8.0/Logos.PaymentService.Adapters.dll" ]; then
          echo "? Adapters project did not build"
          exit 1
        fi

        if [ ! -f "Logos.PaymentService.WebApi/bin/Release/net8.0/Logos.PaymentService.WebApi.dll" ]; then
          echo "? WebApi project did not build"
          exit 1
        fi

        if [ ! -f "Logos.PaymentService.Messaging/bin/Release/net8.0/Logos.PaymentService.Messaging.dll" ]; then
          echo "? Messaging project did not build"
          exit 1
        fi

        echo "? All projects built successfully!"

    - name: Summary
      if: success()
      run: |
        echo "### ? C# Example Verification Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All projects compiled successfully:" >> $GITHUB_STEP_SUMMARY
        echo "- ? Logos.PaymentService.Domain" >> $GITHUB_STEP_SUMMARY
        echo "- ? Logos.PaymentService.Application" >> $GITHUB_STEP_SUMMARY
        echo "- ? Logos.PaymentService.Adapters" >> $GITHUB_STEP_SUMMARY
        echo "- ? Logos.PaymentService.WebApi" >> $GITHUB_STEP_SUMMARY
        echo "- ? Logos.PaymentService.Messaging" >> $GITHUB_STEP_SUMMARY
